name: gizione
description: GiziOne - Aplikasi Edukasi dan Literasi Gizi Mahasiswa
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ── AI & Networking ────────────────────────────────────────
  http: ^1.2.1

  # ── Camera & Image ─────────────────────────────────────────
  image_picker: ^1.1.2

  # ── Environment / API key management ──────────────────────
  flutter_dotenv: ^5.1.0

  # ── State (simple for now — add Riverpod later) ────────────
  # flutter_riverpod: ^2.5.1   ← uncomment when adding providers

  # ── Fonts ──────────────────────────────────────────────────
  google_fonts: ^6.2.1 # fallback if local Poppins not loaded

  # ── Utils ──────────────────────────────────────────────────
  intl: 0.20.2
  connectivity_plus: ^6.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/icons/
    - assets/translations/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-ExtraBold.ttf
          weight: 800
