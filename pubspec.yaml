name: gizione
description: GiziOne - Aplikasi Edukasi dan Literasi Gizi Mahasiswa
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  # ── Video player (splash animation) ───────────────────────
  video_player: ^2.8.3

  # ── AI & Networking ────────────────────────────────────────
  http: ^1.2.1

  # ── In-app Camera ──────────────────────────────────────────
  camera: ^0.10.5+9
  image_picker: ^1.1.2

  # ── Environment ────────────────────────────────────────────
  flutter_dotenv: ^5.1.0

  # ── Local Storage (onboarding flag, cache) ─────────────────
  shared_preferences: ^2.2.3

  # ── Fonts ──────────────────────────────────────────────────
  google_fonts: ^6.2.1

  # ── Utils ──────────────────────────────────────────────────
  connectivity_plus: ^6.0.3
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/icons/
    - assets/translations/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-ExtraBold.ttf
          weight: 800
